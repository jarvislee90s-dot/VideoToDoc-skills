# 复制为 config.yaml 后按需修改；敏感信息请放 .env。
asr_backend: mlx-whisper
asr_model: mlx-community/whisper-large-v3-turbo
language: zh

# mlx-whisper / faster-whisper: 转为 16k/mono wav；qwen: 保留原始音频参数。
audio_profile: auto

capture_mode: fine
scene_threshold: 0.06
hash_threshold: 8
stability_window_seconds: 1.0
refine_fps: 8
min_slide_seconds: 1.5
capture_margin_ms: 500
fallback_interval_sec: 15
keep_all_candidates: false
ocr_dedupe: false
ocr_similarity_threshold: 0.92
duplicate_change_threshold: 0.005
different_change_threshold: 0.12
different_hash_threshold: 16

sync_offset_ms: null
low_confidence_threshold: 0.55
mindmap_backend: agent
mindmap_model: gpt-4o-mini

feishu_folder_token: ""
feishu_identity: user

terms:
  API: API
  Python: Python
  GitHub: GitHub
